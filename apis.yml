aid: ble
name: BLE
description: >-
  Bluetooth Low Energy (BLE) is a wireless personal area network technology
  designed for IoT and embedded devices that require short-range communication
  with minimal power consumption. BLE is widely used in wearables, beacons,
  health monitors, and smart home devices.
