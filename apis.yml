  - type: Features
    data:
      - name: Low Energy Protocol Stack
        description: >-
          BLE defines a complete protocol stack from Physical Layer through Application,
          enabling ultra-low-power wireless communication for IoT and wearable devices.
      - name: Generic Attribute Profile (GATT)
        description: >-
          GATT defines a client/server model for data exchange using services and
          characteristics, enabling standardized device interoperability across vendors.
      - name: Generic Access Profile (GAP)
        description: >-
          GAP controls connections and advertising in BLE, defining how devices discover
          each other and establish connections.
      - name: Advertising and Scanning
        description: >-
          BLE advertising allows devices to broadcast data without requiring a
          connection, enabling beacons, proximity sensing, and asset tracking.
      - name: LE Audio
        description: >-
          Bluetooth 5.2+ LE Audio introduces LC3 codec, Auracast broadcast audio,
          and hearing aid profiles for next-generation wireless audio applications.
      - name: Direction Finding
        description: >-
          Bluetooth 5.1+ Direction Finding supports Angle of Arrival (AoA) and
          Angle of Departure (AoD) for indoor positioning and real-time location.
      - name: Bluetooth Mesh
        description: >-
          The Bluetooth Mesh specification enables many-to-many communications for
          large-scale IoT deployments in buildings, industry, and infrastructure.
  - type: UseCases
    data:
      - name: Wearable Health Devices
        description: >-
          BLE powers fitness trackers, smartwatches, heart rate monitors, and medical
          wearables using standardized GATT health profiles.
      - name: Proximity Beacons
        description: >-
          BLE beacons broadcast advertising packets for proximity detection, indoor
          positioning, and contextual notifications in retail and logistics.
      - name: Smart Home Automation
        description: >-
          BLE Mesh enables smart lighting, HVAC control, and security systems in
          residential and commercial building automation.
      - name: Industrial IoT
        description: >-
          BLE provides wireless sensor connectivity for industrial monitoring,
          predictive maintenance, and asset tracking applications.
      - name: Healthcare Monitoring
        description: >-
          BLE medical devices including glucose meters, blood pressure monitors, and
          pulse oximeters use standardized health profiles for mobile integration.
  - type: Integrations
    data:
      - name: Apple Core Bluetooth
        description: >-
          iOS and macOS Core Bluetooth framework provides native BLE central and
          peripheral role implementation for Apple platform apps.
      - name: Android Bluetooth API
        description: >-
          Android Bluetooth API provides BLE central and peripheral support for
          Android application development.
      - name: Zephyr RTOS
        description: >-
          The Zephyr Project includes a full BLE stack (Zephyr BT) for embedded
          and IoT firmware development.
      - name: NRF Connect SDK
        description: >-
          Nordic Semiconductor's nRF Connect SDK provides BLE and Bluetooth mesh
          implementation for nRF52 and nRF53 series SoCs.
      - name: Web Bluetooth API
        description: >-
          The W3C Web Bluetooth API enables browser-based applications to communicate
          with BLE devices via JavaScript.
