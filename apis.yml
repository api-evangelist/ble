aid: ble
name: BLE
description: >-
  Bluetooth Low Energy (BLE), also known as Bluetooth Smart, is a wireless personal
  area network technology designed and marketed by the Bluetooth Special Interest Group
  (Bluetooth SIG). Aimed at IoT and embedded applications, BLE provides reduced power
  consumption while maintaining similar communication range to classic Bluetooth. The
  specification is managed by the Bluetooth SIG and covers the full protocol stack
  including the Generic Attribute Profile (GATT), Generic Access Profile (GAP), and
  the various service and characteristic specifications used for device interoperability.
