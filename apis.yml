apis:
  - aid: ble:bluetooth-core-specification
    name: Bluetooth Core Specification
    description: >-
      The Bluetooth Core Specification defines the complete Bluetooth wireless
      communication protocol stack including BLE (LE) and Classic Bluetooth.
      The current stable version is Bluetooth 5.4. The specification covers the
      Physical Layer, Link Layer, HCI, L2CAP, SM, GAP, and GATT layers, as well as
      LE Audio, Isochronous Channels, and Direction Finding extensions.
    humanURL: https://www.bluetooth.com/specifications/specs/core60/
    tags:
      - BLE
      - Bluetooth
      - Core Specification
      - Protocols
      - Standards
    properties:
      - type: Documentation
        url: https://www.bluetooth.com/specifications/specs/
      - type: Specification
        url: https://www.bluetooth.com/specifications/specs/core60/
  - aid: ble:gatt-specification
    name: GATT and Assigned Numbers
    description: >-
      The Generic Attribute Profile (GATT) defines the framework for data transfer
      between Bluetooth LE devices. The Bluetooth SIG maintains assigned numbers for
      services, characteristics, and descriptors that enable interoperable implementations.
      GATT services include Battery Service, Heart Rate, Device Information, Health
      Thermometer, and many other standardized profiles.
    humanURL: https://www.bluetooth.com/specifications/assigned-numbers/
    tags:
      - BLE
      - GATT
      - IoT
      - Profiles
      - Standards
    properties:
      - type: Documentation
        url: https://www.bluetooth.com/specifications/assigned-numbers/
      - type: Specification
        url: https://www.bluetooth.com/specifications/assigned-numbers/
  - aid: ble:mesh-networking
    name: Bluetooth Mesh Networking
    description: >-
      Bluetooth Mesh enables many-to-many device communications and is particularly
      suited for IoT applications that require large-scale device networks, including
      building automation, industrial IoT, and smart city infrastructure.
    humanURL: https://www.bluetooth.com/specifications/specs/mesh-profile/
    tags:
      - BLE
      - IoT
      - Mesh
      - Networking
      - Standards
    properties:
      - type: Documentation
        url: https://www.bluetooth.com/specifications/specs/mesh-profile/
      - type: Specification
        url: https://www.bluetooth.com/specifications/specs/mesh-profile/
